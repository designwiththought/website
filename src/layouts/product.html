  <main id="main">
    <article class="container--narrow section reader reader--wide product-reader">
      <a class="btn btn--link reader__back" href="{{basePath}}products/">
        <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg>
        <span class="reader__back-label">All products</span>
      </a>

      <header class="reader__head">
        <div class="reader__kicker"><span class="kicker">&sect; Product</span></div>
        <h1>{{title}}</h1>
        <div class="reader__meta">
          {{#if price}}<span class="kicker">{{price}}</span>{{/if}}
          {{#if tag1}}<span class="kicker">&middot; {{tag1}}</span>{{/if}}
          {{#if tag2}}<span class="kicker">&middot; {{tag2}}</span>{{/if}}
        </div>
      </header>

      <div class="cover-frame cover-frame--book product-reader__cover">
        {{coverHtml}}
      </div>

      <div class="prose">
        {{#if note}}<p class="lead">{{note}}</p>{{/if}}
        {{bodyHtml}}
      </div>

      {{#if url}}
      <p class="product-reader__buy">
        <a class="btn btn--primary" href="{{url}}" target="_blank" rel="noopener noreferrer">
          Buy from {{urlHost}}
          <svg aria-hidden="true" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M9 7h8v8"/></svg>
        </a>
      </p>
      {{/if}}
    </article>
  </main>
