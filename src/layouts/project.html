  <main id="main">
    <article class="reader" style="max-width: 760px;">
      <a class="btn btn--link reader__back" href="{{basePath}}projects/">
        <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg>
        <span class="reader__back-label">All projects</span>
      </a>

      <div class="reader__kicker"><span class="kicker">{{status}}</span></div>
      <h1>{{title}}</h1>
      <p class="lead">{{summary}}</p>
      <div class="reader__meta">
        <span class="kicker">{{year}}</span>
        {{#if tagsJoined}}<span class="kicker">&middot; {{tagsJoined}}</span>{{/if}}
      </div>

      <div class="project-plate project-plate--{{plate}}">
        <div class="project-plate__glyph">{{glyph}}</div>
        <div class="project-plate__label">{{label}}</div>
      </div>

      <div class="reader__body prose">
        {{bodyHtml}}
      </div>
    </article>
  </main>
