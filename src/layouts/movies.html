  <main id="main">
    <article class="container--narrow section reader reader--wide movie-reader">
      <a class="btn btn--link reader__back" href="{{basePath}}enjoying/">
        <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg>
        <span class="reader__back-label">All enjoying</span>
      </a>

      <header class="reader__head">
        <div class="reader__kicker">
          <span class="kicker">&sect; Movie</span>
          <span class="kicker">&middot; {{date}}</span>
        </div>
        <h1>{{title}} <em class="movie-reader__year">({{year}})</em></h1>
        <div class="reader__meta">
          <span class="kicker">dir. {{director}}</span>
          <!-- TODO(a11y): plain <span> without a role can't carry aria-label
               reliably. Add role="img" + aria-label, or surface the rating
               via a sibling visually-hidden span. -->
          <span class="kicker">&middot; <span class="movie-row__rating">{{starsHtml}}</span></span>
        </div>
      </header>

      <div class="movie-row__poster cover-frame cover-frame--poster">
        <div class="cover-placeholder cover-placeholder--paper cover-placeholder--poster">
          {{title}}
        </div>
      </div>

      <div class="prose">
        <p class="lead">{{note}}</p>
        {{afterthoughtHtml}}
      </div>

      <nav class="note-reader__nav" aria-label="Between entries">
        <div>
          {{#if prev}}
          <a href="{{basePath}}movies/{{prev.slug}}/" class="note-reader__nav-link">
            <span class="kicker">&larr; Earlier</span>
            <span>{{prev.title}}</span>
          </a>
          {{/if}}
        </div>
        <div class="note-reader__nav-right">
          {{#if next}}
          <a href="{{basePath}}movies/{{next.slug}}/" class="note-reader__nav-link note-reader__nav-link--right">
            <span class="kicker">Later &rarr;</span>
            <span>{{next.title}}</span>
          </a>
          {{/if}}
        </div>
      </nav>
    </article>
  </main>
