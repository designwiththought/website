  <main id="main">
    <div class="container--narrow section">
      <header class="page-header page-header--left">
        <span class="kicker">{{pageKicker}}</span>
        <h1>{{pageHeading}}</h1>
        <p class="lead">{{pageDek}}</p>
      </header>

      <ul class="essay-list enjoying-list">
        {{#each items}}
        <li class="essay-card enjoying-card">
          <a class="essay-card__link" href="{{basePath}}{{kindPath}}/{{slug}}/">
            <div class="essay-card__meta">
              <span class="kicker">&sect; {{kindLabel}}</span>
              {{#if subMeta}}<span class="essay-card__date">&middot; {{subMeta}}</span>{{/if}}
            </div>
            <h3 class="essay-card__title">{{title}}</h3>
            <div class="essay-card__author">{{byline}}</div>
            <p class="essay-card__dek">{{note}}</p>
          </a>
        </li>
        {{/each}}
      </ul>

      <nav class="enjoying-pagination" aria-label="Enjoying pagination">
        <div>
          {{#if prevHref}}
          <a class="btn btn--link" href="{{prevHref}}">
            <span class="kicker">&larr; Newer</span>
          </a>
          {{/if}}
        </div>
        <div class="t-small enjoying-pagination__status">
          Page {{pageNumber}} of {{totalPages}}
        </div>
        <div>
          {{#if nextHref}}
          <a class="btn btn--link" href="{{nextHref}}">
            <span class="kicker">Older &rarr;</span>
          </a>
          {{/if}}
        </div>
      </nav>
    </div>
  </main>
