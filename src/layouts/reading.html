  <main id="main">
    <article class="container--narrow section reader reading-reader" style="max-width: 760px; margin: 0 auto;">
      <a class="btn btn--link reader__back" href="{{basePath}}enjoying/">
        <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg>
        <span class="reader__back-label">All enjoying</span>
      </a>

      <header class="reader__head">
        <div class="reader__kicker">
          <span class="kicker">&sect; Reading</span>
          <span class="kicker">&middot; {{statusLabel}}</span>
        </div>
        <h1>{{title}}</h1>
        <div class="reader__meta">
          <span class="kicker">{{author}}</span>
        </div>
      </header>

      <div class="book-card book-card--single" style="margin: 28px 0 36px; max-width: 320px;">
        <div class="book-card__cover">
          <div class="book-card__cover-placeholder reading-card__spine reading-card__spine--{{spine}}" style="aspect-ratio: 2/3; display: flex; align-items: center; justify-content: center; padding: 18px; text-align: center;">
            <span class="reading-card__spine-title">{{title}}</span>
          </div>
        </div>
      </div>

      <div class="prose">
        <p class="lead">{{note}}</p>
        {{afterthoughtHtml}}
      </div>

      <nav class="note-reader__nav" aria-label="Between entries">
        <div>
          {{#if prev}}
          <a href="{{basePath}}reading/{{prev.slug}}/" class="note-reader__nav-link">
            <span class="kicker">&larr; Earlier</span>
            <span>{{prev.title}}</span>
          </a>
          {{/if}}
        </div>
        <div class="note-reader__nav-right">
          {{#if next}}
          <a href="{{basePath}}reading/{{next.slug}}/" class="note-reader__nav-link note-reader__nav-link--right">
            <span class="kicker">Later &rarr;</span>
            <span>{{next.title}}</span>
          </a>
          {{/if}}
        </div>
      </nav>
    </article>
  </main>
