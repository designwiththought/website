  <main id="main">
    <div class="container section">
      <header class="page-header page-header--left">
        <span class="kicker">&sect; Projects</span>
        <h1>Projects</h1>
        <p class="lead">Things I&rsquo;ve made, or am still making. Most are about accessibility or reading &mdash; the two topics I keep circling back to.</p>
      </header>

      <div class="grid grid--projects">
        {{#each projects}}
        <a class="project-tile" href="{{basePath}}projects/{{slug}}/">
          <div class="project-tile__plate project-tile__plate--{{plate}}">
            <div class="project-tile__glyph">{{glyph}}</div>
            <div class="project-tile__plate-label">{{label}}</div>
          </div>
          <div class="project-tile__body">
            <div class="project-tile__meta">
              <span class="kicker">{{status}}</span>
              <span class="project-tile__year">{{year}}</span>
            </div>
            <h4 class="project-tile__title">{{title}}</h4>
            <p class="project-tile__blurb">{{summary}}</p>
          </div>
        </a>
        {{/each}}
      </div>
    </div>
  </main>
