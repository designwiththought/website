  <main id="main">
    <div class="reader-with-toc">
      <article class="reader">
        <a class="btn btn--link reader__back" href="{{basePath}}{{backHref}}">
          <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg>
          <span class="reader__back-label">{{backLabel}}</span>
        </a>
        <div class="reader__kicker"><span class="kicker">&sect; {{kind}}</span></div>
        <h1>{{title}}</h1>
        <p class="reader__dek">{{summary}}</p>
        <div class="reader__meta">
          <span class="kicker">{{date}}</span>
          {{#if read}}<span class="kicker">&middot; {{read}}</span>{{/if}}
          {{#if tag1}}<span class="kicker">&middot; {{tag1}}</span>{{/if}}
          {{#if tag2}}<span class="kicker">&middot; {{tag2}}</span>{{/if}}
          {{#if tag3}}<span class="kicker">&middot; {{tag3}}</span>{{/if}}
        </div>
        <div class="reader__body prose">
          {{bodyHtml}}
        </div>
      </article>

      {{#if toc}}
      <aside class="toc" aria-label="Table of contents">
        <div class="toc__title">In this essay</div>
        <ol>
          {{#each toc}}
          <li><a href="#{{id}}">{{label}}</a></li>
          {{/each}}
        </ol>
      </aside>
      {{/if}}
    </div>
  </main>
