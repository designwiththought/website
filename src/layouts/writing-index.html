  <main id="main">
    <div class="container section">
      <header class="page-header page-header--left">
        <span class="kicker">{{pageKicker}}</span>
        <h1>{{pageHeading}}</h1>
        <p class="lead">{{pageDek}}</p>
        {{feedLinkHtml}}
      </header>

      {{filterRowHtml}}

      <div class="essay-list" data-tag-target>
        {{#each items}}
        <a class="essay-card" href="{{basePath}}{{url}}" data-tags="{{tagList}}" {{hiddenAttr}}>
          <div class="essay-card__meta">
            <span class="kicker">&sect; {{kind}}</span>
            <span class="essay-card__date">{{date}} &middot; {{read}}</span>
          </div>
          <h3 class="essay-card__title">{{title}}</h3>
          <p class="essay-card__dek">{{summary}}</p>
          <div class="essay-card__tags">
            {{#if tag1}}<span class="tag">{{tag1}}</span>{{/if}}
            {{#if tag2}}<span class="tag">{{tag2}}</span>{{/if}}
            {{#if tag3}}<span class="tag">{{tag3}}</span>{{/if}}
          </div>
        </a>
        {{/each}}
        {{emptyHtml}}
        <p class="empty-state" data-tag-empty hidden>No items match that tag. <a class="btn btn--link" data-tag-reset href="">Show all</a></p>
      </div>
    </div>
  </main>
